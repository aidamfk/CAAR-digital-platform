<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CAAR - Change Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --orange: #E8761E;
      --orange-dark: #c9601a;
      --ink: #1a1a1a;
      --muted: #6b6b6b;
      --line: #e8dfd5;
      --bg: #f8f4ef;
      --danger: #b63b2d;
      --danger-bg: #fff1f0;
      --danger-line: #ffd2ce;
      --ok: #1f8f4d;
      --ok-bg: #ecfaf2;
      --ok-line: #c9eed8;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 82% 10%, #ffe8d0 0, transparent 28%), var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(18, 15, 12, 0.14);
      padding: 28px 24px;
    }

    h1 {
      margin: 0;
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
    }

    .subtitle {
      margin: 7px 0 18px;
      color: var(--muted);
      font-size: .87rem;
      line-height: 1.5;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field label {
      font-size: .77rem;
      font-weight: 700;
      color: var(--muted);
    }

    .field input {
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 11px 12px;
      font-family: inherit;
      font-size: .89rem;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    .field input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(232,118,30,.14);
    }

    .msg {
      display: none;
      margin-bottom: 10px;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: .79rem;
      font-weight: 700;
    }

    .msg.show { display: block; }
    .msg.err {
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid var(--danger-line);
    }
    .msg.ok {
      background: var(--ok-bg);
      color: var(--ok);
      border: 1px solid var(--ok-line);
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .btn {
      border: 0;
      border-radius: 9px;
      font-family: inherit;
      font-weight: 700;
      font-size: .82rem;
      padding: 10px 14px;
      cursor: pointer;
      color: #fff;
      background: var(--orange);
    }

    .btn:hover { background: var(--orange-dark); }
    .btn:disabled { opacity: .7; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Set New Password</h1>
    <p class="subtitle">For security, you must change your default password before accessing your dashboard.</p>

    <div id="cpMsg" class="msg"></div>

    <form id="changePasswordForm" novalidate>
      <div class="field">
        <label for="newPassword">New Password</label>
        <input id="newPassword" type="password" autocomplete="new-password" required />
      </div>
      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" type="password" autocomplete="new-password" required />
      </div>

      <div class="actions">
        <button id="submitBtn" type="submit" class="btn">Update Password</button>
      </div>
    </form>
  </div>

  <script>
    (function () {
      'use strict';

      var ROLE_HOME = {
        client: 'client-dashboard.html',
        admin: 'admin-dashboard.html',
        expert: 'expert-dashboard.html'
      };

      function getToken() {
        return localStorage.getItem('token') || null;
      }

      function getStoredUser() {
        try {
          return JSON.parse(localStorage.getItem('user') || 'null');
        } catch (_) {
          return null;
        }
      }

      function setMsg(message, isError) {
        var el = document.getElementById('cpMsg');
        if (!el) return;

        if (!message) {
          el.className = 'msg';
          el.textContent = '';
          return;
        }

        el.className = 'msg show ' + (isError ? 'err' : 'ok');
        el.textContent = message;
      }

      function redirectToRoleHome() {
        var u = getStoredUser();
        var role = (u && u.role) || localStorage.getItem('role') || 'client';
        window.location.href = ROLE_HOME[role] || 'client-dashboard.html';
      }

      async function refreshProfile() {
        var token = getToken();
        if (!token) return null;

        var res = await fetch('http://localhost:3000/api/auth/me', {
          headers: { Authorization: 'Bearer ' + token }
        });

        var data = await res.json().catch(function () { return {}; });
        if (res.ok && data && data.user) {
          localStorage.setItem('user', JSON.stringify(data.user));
          localStorage.setItem('role', data.user.role || localStorage.getItem('role') || 'client');
          localStorage.setItem('must_change_password', data.user.must_change_password ? '1' : '0');
          return data.user;
        }
        return null;
      }

      async function bootstrap() {
        var token = getToken();
        if (!token) {
          window.location.href = 'login.html';
          return;
        }

        var user = getStoredUser();
        var mustChange = (user && user.must_change_password) || localStorage.getItem('must_change_password') === '1';

        if (!mustChange) {
          var latest = await refreshProfile();
          var stillMustChange = latest ? !!latest.must_change_password : false;
          if (!stillMustChange) {
            redirectToRoleHome();
            return;
          }
        }
      }

      document.getElementById('changePasswordForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        setMsg('', true);

        var newPassword = (document.getElementById('newPassword').value || '').trim();
        var confirmPassword = (document.getElementById('confirmPassword').value || '').trim();

        if (!newPassword || !confirmPassword) {
          setMsg('Both password fields are required.', true);
          return;
        }

        if (newPassword.length < 8) {
          setMsg('Password must be at least 8 characters.', true);
          return;
        }

        if (newPassword !== confirmPassword) {
          setMsg('Passwords do not match.', true);
          return;
        }

        var token = getToken();
        if (!token) {
          window.location.href = 'login.html';
          return;
        }

        var submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Updating...';

        try {
          var res = await fetch('http://localhost:3000/api/auth/force-change-password', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: 'Bearer ' + token
            },
            body: JSON.stringify({
              new_password: newPassword,
              confirm_password: confirmPassword
            })
          });

          var data = await res.json().catch(function () { return {}; });
          if (!res.ok) {
            setMsg((data && data.error) || 'Failed to update password.', true);
            return;
          }

          if (data && data.user) {
            localStorage.setItem('user', JSON.stringify(data.user));
            localStorage.setItem('role', data.user.role || localStorage.getItem('role') || 'client');
          }
          localStorage.setItem('must_change_password', '0');

          setMsg('Password updated successfully. Redirecting...', false);
          setTimeout(function () {
            redirectToRoleHome();
          }, 700);
        } catch (_) {
          setMsg('Server error. Please try again.', true);
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Update Password';
        }
      });

      bootstrap();
    })();
  </script>
</body>
</html>
