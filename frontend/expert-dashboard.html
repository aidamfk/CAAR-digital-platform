<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CAAR — Expert Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --orange: #E8761E;
      --orange-dark: #c9601a;
      --bg: #f6f2ec;
      --card: #ffffff;
      --ink: #1d1d1d;
      --muted: #707070;
      --line: #e8dfd5;
      --ok: #207f49;
      --err: #bf3f2f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 8% 10%, #ffe6cb 0, transparent 28%), var(--bg);
    }
    .wrap { max-width: 1260px; margin: 0 auto; padding: 22px 18px 28px; }

    .top {
      display:flex;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:14px;
    }
    .top h1 {
      margin:0;
      font-family:'Playfair Display', serif;
      font-size:1.54rem;
    }
    .top p { margin:3px 0 0; color:var(--muted); font-size:.86rem; }

    .btn {
      border:0;
      border-radius:9px;
      font-weight:700;
      padding:10px 14px;
      cursor:pointer;
      font-family:inherit;
      font-size:.8rem;
    }
    .btn-orange { background:var(--orange); color:#fff; }
    .btn-orange:hover { background:var(--orange-dark); }
    .btn-light { background:#fff; border:1px solid var(--line); }

    .api-msg {
      display:none;
      margin-bottom:10px;
      border-radius:10px;
      padding:10px 12px;
      font-size:.8rem;
      font-weight:600;
    }
    .api-msg.ok { display:block; background:#eaf8ef; color:#1e7c45; border:1px solid #caebd6; }
    .api-msg.err { display:block; background:#fff2f1; color:#b53c2d; border:1px solid #ffd7d2; }

    .stats {
      display:grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap:10px;
      margin-bottom:14px;
    }
    .stat {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
      min-height:84px;
    }
    .stat .l { color:var(--muted); font-size:.73rem; }
    .stat .v { margin-top:6px; font-size:1.2rem; font-weight:800; }

    .layout {
      display:grid;
      grid-template-columns: 1.15fr .85fr;
      gap:14px;
    }

    .panel {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
    }
    .panel-head {
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .panel-head h2 {
      margin:0;
      font-size:.94rem;
      font-weight:800;
    }
    .panel-body { padding:12px 14px; }

    table { width:100%; border-collapse:collapse; }
    th, td {
      text-align:left;
      border-bottom:1px solid #f0e9e0;
      padding:9px 8px;
      font-size:.78rem;
      vertical-align:top;
    }
    th { background:#fcfaf7; position:sticky; top:0; z-index:1; }

    .table-wrap { max-height:510px; overflow:auto; }

    .status {
      display:inline-flex;
      padding:2px 9px;
      border-radius:999px;
      font-size:.69rem;
      border:1px solid transparent;
      text-transform:capitalize;
      font-weight:700;
    }
    .status.expert_assigned, .status.reported { color:#1f5ea8; background:#eef5ff; border-color:#cde0ff; }
    .status.closed { color:#207f49; background:#eaf9f0; border-color:#c5f0d5; }
    .status.rejected { color:#bf3f2f; background:#fff1ef; border-color:#ffd4d0; }

    .field { margin-bottom:10px; }
    .field label {
      display:block;
      margin-bottom:5px;
      font-size:.75rem;
      font-weight:700;
      color:#464646;
    }
    .field input,
    .field textarea,
    .field select {
      width:100%;
      border:1px solid var(--line);
      border-radius:9px;
      padding:9px 10px;
      font-size:.8rem;
      font-family:inherit;
      background:#fff;
    }
    .field textarea { min-height:94px; resize:vertical; }

    .inline {
      display:flex;
      gap:8px;
      align-items:center;
    }
    .no-claims-msg {
      display: none;
      margin-bottom: 10px;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: .8rem;
      font-weight: 600;
      color: #7d4f00;
      background: #fff6e7;
      border: 1px solid #ffe0ad;
    }

    @media (max-width: 980px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Expert Workspace</h1>
        <p>Review assigned claims, submit reports, and manage your availability.</p>
      </div>
      <div class="inline">
        <button class="btn btn-light" id="expertRefresh">Refresh</button>
        <button class="btn btn-light" id="expertHome">Public Site</button>
        <button class="btn btn-orange" id="expertLogout">Logout</button>
      </div>
    </div>

    <div class="api-msg" id="expertApiMsg"></div>

    <section class="stats">
      <article class="stat"><div class="l">Assigned Claims</div><div class="v" id="esAssigned">-</div></article>
      <article class="stat"><div class="l">In Progress</div><div class="v" id="esProgress">-</div></article>
      <article class="stat"><div class="l">Completed</div><div class="v" id="esCompleted">-</div></article>
      <article class="stat"><div class="l">Reports Submitted</div><div class="v" id="esReports">-</div></article>
    </section>

    <section class="layout">
      <article class="panel">
        <div class="panel-head">
          <h2>Assigned Claims</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>Client</th><th>Status</th><th>Description</th></tr></thead>
            <tbody id="expertClaimsBody"></tbody>
          </table>
        </div>
      </article>

      <article class="panel">
        <div class="panel-head"><h2>Submit Expert Report</h2></div>
        <div class="panel-body">
          <div class="no-claims-msg" id="noClaimsMsg"></div>

          <div class="field">
            <label for="expertAvailability">Availability</label>
            <div class="inline">
              <select id="expertAvailability">
                <option value="true">Available</option>
                <option value="false">Busy</option>
              </select>
              <button class="btn btn-light" id="saveAvailabilityBtn">Save</button>
            </div>
          </div>

          <div class="field">
            <label for="reportClaimSelect">Assigned Claim</label>
            <select id="reportClaimSelect">
              <option value="">Select assigned claim...</option>
            </select>
          </div>
          <div class="field">
            <label for="reportValue">Report (Text or Filename)</label>
            <input id="reportValue" type="text" placeholder="e.g. report-claim-7.pdf or short summary"/>
          </div>
          <div class="field">
            <label for="reportDate">Report Date</label>
            <input id="reportDate" type="date"/>
          </div>
          <div class="field">
            <label for="reportDamage">Estimated Damage (DZD)</label>
            <input id="reportDamage" type="number" min="0.01" step="0.01" placeholder="e.g. 120000"/>
          </div>
          <div class="field">
            <label for="reportConclusion">Conclusion</label>
            <select id="reportConclusion">
              <option value="covered">covered</option>
              <option value="not_covered">not_covered</option>
            </select>
          </div>
          <div class="field">
            <label for="reportDetails">Report Details</label>
            <textarea id="reportDetails" placeholder="Provide detailed technical assessment and recommendations..."></textarea>
          </div>
          <button class="btn btn-orange" id="submitReportBtn" style="width:100%;">Submit Report</button>
        </div>
      </article>
    </section>
  </div>

  <script src="app-state.js"></script>
  <script src="auth.js"></script>
  <script src="js/expert-dashboard.js"></script>
</body>
</html>
